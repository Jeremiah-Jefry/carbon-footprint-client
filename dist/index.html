<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carbon Footprint Tracker</title>
  <link rel="stylesheet" href="./styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
  <main class="container">
    <header class="hero">
      <h1>Carbon Footprint</h1>
      <p>Your environmental impact, visualized.</p>
    </header>

    <div class="layout-grid">
      <!-- Main Content (Form) -->
      <section class="card">
        <div class="card-header">
          <h2>Log Today's Activity</h2>
        </div>

        <form id="footprint-form">
          <div class="section-group">
            <h3>Transportation (km)</h3>
            <div class="input-grid">
              <div class="input-group"><label>Gas Car</label><input type="number" min="0" value="0" id="gas_car" /></div>
              <div class="input-group"><label>EV</label><input type="number" min="0" value="0" id="ev" /></div>
              <div class="input-group"><label>Bus</label><input type="number" min="0" value="0" id="bus" /></div>
              <div class="input-group"><label>Train</label><input type="number" min="0" value="0" id="train" /></div>
              <div class="input-group"><label>Walking</label><input type="number" min="0" value="0" id="walking" /></div>
              <div class="input-group"><label>Cycling</label><input type="number" min="0" value="0" id="cycling" /></div>
            </div>
          </div>

          <div class="section-group">
            <h3>Diet (servings)</h3>
            <div class="input-grid">
              <div class="input-group"><label>Beef</label><input type="number" min="0" value="0" id="beef" /></div>
              <div class="input-group"><label>Chicken</label><input type="number" min="0" value="0" id="chicken" /></div>
              <div class="input-group"><label>Fish</label><input type="number" min="0" value="0" id="fish" /></div>
              <div class="input-group"><label>Vegetarian</label><input type="number" min="0" value="0" id="vegetarian" /></div>
              <div class="input-group"><label>Vegan</label><input type="number" min="0" value="0" id="vegan" /></div>
            </div>
          </div>

          <div class="section-group">
            <h3>Energy Usage (hours/loads)</h3>
            <div class="input-grid">
              <div class="input-group"><label>Streaming Video</label><input type="number" min="0" step="0.1" value="0" id="streaming_video" /></div>
              <div class="input-group"><label>Hot Wash & Dry</label><input type="number" min="0" value="0" id="laundry_hot_wash_dry" /></div>
              <div class="input-group"><label>Cold Wash & Air Dry</label><input type="number" min="0" value="0" id="laundry_cold_wash_air_dry" /></div>
              <div class="input-group"><label>Room Light (LED)</label><input type="number" min="0" step="0.1" value="0" id="room_light_led" /></div>
              <div class="input-group"><label>Room Light (Incandescent)</label><input type="number" min="0" step="0.1" value="0" id="room_light_incandescent" /></div>
            </div>
          </div>

          <button type="submit" class="btn-primary">Calculate Footprint</button>
        </form>
      </section>

      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="card dashboard-card">
          <h2>Daily Dashboard</h2>
          <div class="footprint-number">
            <span id="totalFootprint">0.00</span>
            <small>kg CO₂e</small>
          </div>
          <div id="equivalents" class="equivalents">
            Start logging activities to see your impact.
          </div>
        </div>

        <div class="card insight-card">
          <div class="insight-content">
            <h2>Your Daily Mix</h2>
            <p id="dailyInsight">Your personalized sustainability insight will appear here.</p>
          </div>
        </div>
      </aside>
    </div>
  </main>

  <script type="module" src="./app.js"></script>
</body>
</html>
